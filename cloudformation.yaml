AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Mitsuketa - Scalable Audio/Video Fingerprinting System
  Infrastructure: EC2 Instance + Security Groups + IAM Roles for CI/CD Pipeline

Parameters:
  InstanceType:
    Type: String
    Default: t2.medium
    AllowedValues: [t2.micro, t2.small, t2.medium, t3.medium]
    Description: EC2 instance type. t2.medium recommended for audio/video processing.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access.

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
    Description: Ubuntu 22.04 LTS AMI (auto-resolved per region via SSM).

Resources:

  # ─────────────────────────────────────────────────────────
  # 1. Security Group
  # ─────────────────────────────────────────────────────────
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Mitsuketa - Allow HTTP, HTTPS, SSH and App port access
      SecurityGroupIngress:
        - Description: SSH access
          IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - Description: HTTP access
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - Description: HTTPS access
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - Description: FastAPI / Uvicorn app port
          IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Mitsuketa-SG

  # ─────────────────────────────────────────────────────────
  # 2. IAM Role for EC2 (CodeDeploy + S3 artifact access)
  # ─────────────────────────────────────────────────────────
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Mitsuketa-EC2-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforAWSCodeDeploy
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: Mitsuketa-EC2-Role

  # ─────────────────────────────────────────────────────────
  # 3. Instance Profile (attaches IAM Role to EC2)
  # ─────────────────────────────────────────────────────────
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: Mitsuketa-EC2-Profile
      Roles:
        - !Ref EC2InstanceRole

  # ─────────────────────────────────────────────────────────
  # 4. EC2 Instance
  # ─────────────────────────────────────────────────────────
  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroups:
        - !Ref WebServerSecurityGroup
      Tags:
        - Key: Name
          Value: Mitsuketa-Server
        - Key: Environment
          Value: Production
        - Key: Project
          Value: Mitsuketa
      # UserData: Bootstraps CodeDeploy agent on first boot
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/userdata.log 2>&1

          echo "=== Starting Mitsuketa EC2 Bootstrap ==="
          apt-get update -y
          apt-get install -y ruby wget python3 python3-pip python3-venv ffmpeg curl

          # Install AWS CodeDeploy Agent
          cd /tmp
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          wget "https://aws-codedeploy-${!REGION}.s3.${!REGION}.amazonaws.com/latest/install"
          chmod +x ./install
          ./install auto

          systemctl start codedeploy-agent
          systemctl enable codedeploy-agent

          echo "=== CodeDeploy Agent installed and running ==="
          echo "=== Bootstrap complete ==="

# ─────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────
Outputs:
  PublicIP:
    Description: Public IP of the Mitsuketa EC2 instance (use this for Route 53 A record)
    Value: !GetAtt WebServerInstance.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}-PublicIP"

  InstanceId:
    Description: Instance ID (use this to identify EC2 in CodeDeploy deployment group)
    Value: !Ref WebServerInstance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  SecurityGroupId:
    Description: Security Group ID
    Value: !GetAtt WebServerSecurityGroup.GroupId
    Export:
      Name: !Sub "${AWS::StackName}-SGID"
